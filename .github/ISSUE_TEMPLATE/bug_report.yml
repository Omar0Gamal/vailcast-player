name: Bug report
description: Report a reproducible problem in vailcast-player
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the behavior.
      placeholder: |
        1. Install package version...
        2. Use this config...
        3. Run this command...
        4. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 1.1.0
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Integration
      options:
        - Core (vanilla)
        - React
        - Angular
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.x
  - type: input
    id: browser
    attributes:
      label: Browser/runtime
      placeholder: Chrome 124 / Safari 17 / Node only
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue with the latest version.
          required: true
