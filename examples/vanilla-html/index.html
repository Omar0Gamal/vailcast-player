<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vailcast Player - Vanilla Example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #10131a;
        color: #f5f7ff;
      }

      .layout {
        max-width: 960px;
        margin: 40px auto;
        padding: 0 16px;
      }

      #player {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #2a3448;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <h1>Vailcast Player (Vanilla HTML)</h1>
      <div id="player"></div>
    </main>

    <script type="module">
      import { VailcastPlayer } from '../../dist/index.mjs';

      const host = document.getElementById('player');

      new VailcastPlayer(host, {
        manifestUrl: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
        userID: 'vanilla-dev',
        ui: {
          mode: 'cinema',
          inputTheme: {
            accentColor: 'oklch(0.7 0.2 26)',
            focusColor: 'oklch(0.84 0.14 74)',
            trackColor: 'oklch(0.72 0.04 265 / 0.45)',
            selectedColor: 'oklch(0.7 0.2 26 / 0.92)',
          },
        },
        security: {
          lockUserID: true,
        },
        hlsConfig: {
          xhrSetup(xhr) {
            xhr.withCredentials = false;
          },
        },
        watermark: {
          enabled: true,
          jumpIntervalMs: 3000,
        },
      });
    </script>
  </body>
</html>
