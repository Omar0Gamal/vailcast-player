version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Africa/Cairo
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /examples/nextjs-app
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Africa/Cairo
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Africa/Cairo
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
