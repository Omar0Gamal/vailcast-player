name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Read package metadata
        id: pkg
        shell: bash
        run: |
          node -e 'const p=require("./package.json"); console.log(`name=${p.name}`); console.log(`version=${p.version}`);' >> "$GITHUB_OUTPUT"

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run validate

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (already published)
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Version already published on npm. Skipping publish step."
